name: infra

# ⚠️ 一次性前置（訂閱層，需 Owner/Contributor，RG 範圍的部署 SP 做不到）：
#   az provider register --namespace Microsoft.App --wait
#   az provider register --namespace Microsoft.ContainerRegistry --wait
#   az provider register --namespace Microsoft.OperationalInsights --wait
# 未註冊會在部署 ACR / Container Apps 時報 AuthorizationFailed。詳見 docs/11-store-deployment.md §0。

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        type: choice
        options: [dev, staging, prod]
        default: dev
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/infra.yml']

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'dev' }}   # manual-approval gate per environment
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate (what-if)
        run: |
          az deployment group what-if \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters env=${{ github.event.inputs.env || 'dev' }} \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              sqlConnectionString='${{ secrets.SQL_CONNECTION_STRING }}' \
              blobConnectionString='${{ secrets.BLOB_CONNECTION_STRING }}' \
              appInsightsConnectionString='${{ secrets.APPINSIGHTS_CONNECTION_STRING }}' \
              smsPassword='${{ secrets.SMS_PASSWORD }}' \
              smsUsername='${{ vars.SMS_USERNAME }}' \
              smtpPassword='${{ secrets.SMTP_PASSWORD }}' \
              smtpUsername='${{ vars.SMTP_USERNAME }}' \
              blobBaseUrl='${{ vars.BLOB_BASE_URL }}' \
              blobContainerName='${{ vars.BLOB_CONTAINER || 'tfoodies' }}' \
              fiscMerchantId='${{ vars.FISC_MERCHANT_ID }}' \
              fiscTerminalId='${{ vars.FISC_TERMINAL_ID }}' \
              fiscMerId='${{ vars.FISC_MER_ID }}' \
              fiscMerchantName='${{ vars.FISC_MERCHANT_NAME || 'TFoodies' }}' \
              fiscActionUrl='${{ vars.FISC_ACTION_URL || 'https://www.focas.fisc.com.tw/FOCAS_WEBPOS/online/' }}' \
              fiscAuthResUrl='${{ vars.FISC_AUTH_RES_URL || 'https://tfoodies-api.azurewebsites.net/api/store/payment/return' }}' \
              fiscAdminAuthResUrl='${{ vars.FISC_ADMIN_AUTH_RES_URL || 'https://tfoodies-api.azurewebsites.net/api/store/payment/return-admin' }}' \
              adminSiteUrl='${{ vars.ADMIN_SITE_URL }}' \
              ezpayMerchantId='${{ vars.EZPAY_MERCHANT_ID }}' \
              ezpayHashKey='${{ secrets.EZPAY_HASH_KEY }}' \
              ezpayHashIV='${{ secrets.EZPAY_HASH_IV }}' \
              ezpayBaseUrl='${{ vars.EZPAY_BASE_URL || 'https://inv.ezpay.com.tw/Api' }}'
      - name: Deploy
        run: |
          az deployment group create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters env=${{ github.event.inputs.env || 'dev' }} \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              sqlConnectionString='${{ secrets.SQL_CONNECTION_STRING }}' \
              blobConnectionString='${{ secrets.BLOB_CONNECTION_STRING }}' \
              appInsightsConnectionString='${{ secrets.APPINSIGHTS_CONNECTION_STRING }}' \
              smsPassword='${{ secrets.SMS_PASSWORD }}' \
              smsUsername='${{ vars.SMS_USERNAME }}' \
              smtpPassword='${{ secrets.SMTP_PASSWORD }}' \
              smtpUsername='${{ vars.SMTP_USERNAME }}' \
              blobBaseUrl='${{ vars.BLOB_BASE_URL }}' \
              blobContainerName='${{ vars.BLOB_CONTAINER || 'tfoodies' }}' \
              fiscMerchantId='${{ vars.FISC_MERCHANT_ID }}' \
              fiscTerminalId='${{ vars.FISC_TERMINAL_ID }}' \
              fiscMerId='${{ vars.FISC_MER_ID }}' \
              fiscMerchantName='${{ vars.FISC_MERCHANT_NAME || 'TFoodies' }}' \
              fiscActionUrl='${{ vars.FISC_ACTION_URL || 'https://www.focas.fisc.com.tw/FOCAS_WEBPOS/online/' }}' \
              fiscAuthResUrl='${{ vars.FISC_AUTH_RES_URL || 'https://tfoodies-api.azurewebsites.net/api/store/payment/return' }}' \
              fiscAdminAuthResUrl='${{ vars.FISC_ADMIN_AUTH_RES_URL || 'https://tfoodies-api.azurewebsites.net/api/store/payment/return-admin' }}' \
              adminSiteUrl='${{ vars.ADMIN_SITE_URL }}' \
              ezpayMerchantId='${{ vars.EZPAY_MERCHANT_ID }}' \
              ezpayHashKey='${{ secrets.EZPAY_HASH_KEY }}' \
              ezpayHashIV='${{ secrets.EZPAY_HASH_IV }}' \
              ezpayBaseUrl='${{ vars.EZPAY_BASE_URL || 'https://inv.ezpay.com.tw/Api' }}'
