name: infra

# ⚠️ 一次性前置（訂閱層，需 Owner/Contributor，RG 範圍的部署 SP 做不到）：
#   az provider register --namespace Microsoft.App --wait
#   az provider register --namespace Microsoft.ContainerRegistry --wait
#   az provider register --namespace Microsoft.OperationalInsights --wait
# 未註冊會在部署 ACR / Container Apps 時報 AuthorizationFailed。詳見 docs/11-store-deployment.md §0。

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        type: choice
        options: [dev, staging, prod]
        default: dev
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/infra.yml']

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'dev' }}   # manual-approval gate per environment
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate (what-if)
        run: |
          az deployment group what-if \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters env=${{ github.event.inputs.env || 'dev' }} \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              sqlConnectionString='${{ secrets.SQL_CONNECTION_STRING }}' \
              blobConnectionString='${{ secrets.BLOB_CONNECTION_STRING }}' \
              appInsightsConnectionString='${{ secrets.APPINSIGHTS_CONNECTION_STRING }}' \
              smsPassword='${{ secrets.SMS_PASSWORD }}' \
              smsUsername='${{ vars.SMS_USERNAME }}' \
              smtpPassword='${{ secrets.SMTP_PASSWORD }}' \
              smtpUsername='${{ vars.SMTP_USERNAME }}' \
              blobBaseUrl='${{ vars.BLOB_BASE_URL }}' \
              blobContainerName='${{ vars.BLOB_CONTAINER || 'tfoodies' }}' \
              Fisc__MerchantID='${{ vars.Fisc__MerchantID }}' \
              Fisc__TerminalID='${{ vars.Fisc__TerminalID }}' \
              Fisc__MerID='${{ vars.Fisc__MerID }}' \
              Fisc__ActionUrl='${{ vars.Fisc__ActionUrl || 'https://www.focas.fisc.com.tw/FOCAS_WEBPOS/online/' }}' \
              Fisc__ApiBaseUrl='${{ vars.Fisc__ApiBaseUrl || 'https://tfoodies-api.azurewebsites.net/api' }}' \
              adminSiteUrl='${{ vars.ADMIN_SITE_URL }}' \
              EzPay__MerchantId='${{ vars.EzPay__MerchantId }}' \
              EzPay__HashKey='${{ secrets.EzPay__HashKey }}' \
              EzPay__HashIV='${{ secrets.EzPay__HashIV }}' \
              EzPay__BaseUrl='${{ vars.EzPay__BaseUrl || 'https://inv.ezpay.com.tw/Api' }}' \
              ReCaptcha__SecretKey='${{ secrets.RECAPTCHA_SECRET_KEY }}' \
              recaptchaSiteKey='${{ vars.RECAPTCHA_SITE_KEY }}' \
              gtmId='${{ vars.GTM_ID }}'
      - name: Deploy
        run: |
          az deployment group create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters env=${{ github.event.inputs.env || 'dev' }} \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              sqlConnectionString='${{ secrets.SQL_CONNECTION_STRING }}' \
              blobConnectionString='${{ secrets.BLOB_CONNECTION_STRING }}' \
              appInsightsConnectionString='${{ secrets.APPINSIGHTS_CONNECTION_STRING }}' \
              smsPassword='${{ secrets.SMS_PASSWORD }}' \
              smsUsername='${{ vars.SMS_USERNAME }}' \
              smtpPassword='${{ secrets.SMTP_PASSWORD }}' \
              smtpUsername='${{ vars.SMTP_USERNAME }}' \
              blobBaseUrl='${{ vars.BLOB_BASE_URL }}' \
              blobContainerName='${{ vars.BLOB_CONTAINER || 'tfoodies' }}' \
              Fisc__MerchantID='${{ vars.Fisc__MerchantID }}' \
              Fisc__TerminalID='${{ vars.Fisc__TerminalID }}' \
              Fisc__MerID='${{ vars.Fisc__MerID }}' \
              Fisc__ActionUrl='${{ vars.Fisc__ActionUrl || 'https://www.focas.fisc.com.tw/FOCAS_WEBPOS/online/' }}' \
              Fisc__ApiBaseUrl='${{ vars.Fisc__ApiBaseUrl || 'https://tfoodies-api.azurewebsites.net/api' }}' \
              adminSiteUrl='${{ vars.ADMIN_SITE_URL }}' \
              EzPay__MerchantId='${{ vars.EzPay__MerchantId }}' \
              EzPay__HashKey='${{ secrets.EzPay__HashKey }}' \
              EzPay__HashIV='${{ secrets.EzPay__HashIV }}' \
              EzPay__BaseUrl='${{ vars.EzPay__BaseUrl || 'https://inv.ezpay.com.tw/Api' }}' \
              ReCaptcha__SecretKey='${{ secrets.RECAPTCHA_SECRET_KEY }}' \
              recaptchaSiteKey='${{ vars.RECAPTCHA_SITE_KEY }}' \
              gtmId='${{ vars.GTM_ID }}'
