name: admin

on:
  push:
    branches: [main]
    paths: ['web/admin/**', 'web/packages/**', '.github/workflows/admin.yml']
  pull_request:
    paths: ['web/admin/**', 'web/packages/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
        working-directory: web
      - name: Build admin (Vue SPA)
        env:
          VITE_API_BASE: https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api
        run: npm --workspace admin run build
        working-directory: web
      - name: Verify build output
        run: test -f web/admin/dist/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: web/admin/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: ./admin-dist
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_ADMIN }}
          action: 'upload'
          app_location: 'admin-dist'
          output_location: ''
          skip_app_build: true
