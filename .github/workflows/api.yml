name: api

on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', 'global.json', 'Directory.Build.props', '.github/workflows/api.yml']
  pull_request:
    paths: ['src/**', 'tests/**']

permissions:
  id-token: write   # OIDC login to Azure
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  FUNCTIONS_PROJECT: src/TFoodies.Api.Functions

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test TFoodies.sln --configuration Release
      - name: Publish Functions
        run: dotnet publish ${{ env.FUNCTIONS_PROJECT }} -c Release -o ./publish
      - uses: actions/upload-artifact@v4
        with:
          name: functions
          path: ./publish

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions
          path: ./publish
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # Deploy to a staging slot, smoke-test, then swap (zero-downtime; plan §部署).
      - uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          slot-name: staging
          package: ./publish
      - name: Smoke test staging
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.FUNCTION_APP_NAME }}-staging.azurewebsites.net/api/health" || true)
            [ "$code" = "200" ] && echo "health ok" && exit 0
            sleep 6
          done
          echo "health check failed" && exit 1
      - name: Swap staging -> production
        run: az functionapp deployment slot swap -g ${{ vars.RESOURCE_GROUP }} -n ${{ vars.FUNCTION_APP_NAME }} --slot staging --target-slot production
