name: store

on:
  push:
    branches: [main]
    paths: ['web/store/**', 'web/packages/**', '.github/workflows/store.yml']
  pull_request:
    paths: ['web/store/**', 'web/packages/**']

permissions:
  id-token: write          # OIDC for azure/login
  contents: read
  pull-requests: write

jobs:
  # PR + main: validate the SSR build compiles before we ever build an image.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install deps (retry on esbuild ETXTBSY flake)
        working-directory: web
        run: |
          for i in 1 2 3; do npm ci && break || { echo "npm ci failed, retry $i"; sleep 5; }; done
      - name: Build store (Nuxt SSR / node-server)
        run: npm --workspace store run build
        working-directory: web
      - name: Verify build output
        run: test -f web/store/.output/server/index.mjs

  # main only: build the image in ACR and roll the Container App to it.
  # ACR name is resolved from the resource group (created by store-bootstrap / infra),
  # so no ACR_NAME variable is needed.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    env:
      RG: ${{ vars.RESOURCE_GROUP || 'WeyproUS' }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve ACR name
        id: acr
        run: |
          NAME=$(az acr list -g "$RG" \
            --query "[?starts_with(name,'tfoodiesacr')].name | [0]" -o tsv)
          test -n "$NAME" || { echo "No ACR found in $RG — run store-bootstrap first"; exit 1; }
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: Build image in ACR
        run: |
          az acr build \
            --registry ${{ steps.acr.outputs.name }} \
            --image store:${{ github.sha }} \
            --image store:latest \
            --file web/store/Dockerfile \
            web
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name tfoodies-store \
            --resource-group "$RG" \
            --image ${{ steps.acr.outputs.name }}.azurecr.io/store:${{ github.sha }}
