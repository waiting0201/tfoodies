name: store

on:
  push:
    branches: [main]
    paths: ['web/store/**', 'web/packages/**', '.github/workflows/store.yml']
  pull_request:
    paths: ['web/store/**', 'web/packages/**']

permissions:
  contents: read
  pull-requests: write   # SWA preview comment

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
        working-directory: web
      - name: Build store (Nuxt SSR for Azure SWA)
        env:
          NUXT_PUBLIC_API_BASE: https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api
          NITRO_PRESET: azure_static_web_apps
        run: npm --workspace store run build
        working-directory: web
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_STORE }}
          action: 'upload'
          app_location: 'web/store'
          output_location: '.output/public'
          api_location: 'web/store/.output/server'
          skip_app_build: true
