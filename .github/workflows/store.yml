name: store

on:
  push:
    branches: [main]
    paths: ['web/store/**', 'web/packages/**', '.github/workflows/store.yml']
  pull_request:
    paths: ['web/store/**', 'web/packages/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install deps (retry on esbuild ETXTBSY flake)
        working-directory: web
        run: |
          for i in 1 2 3; do npm ci && break || { echo "npm ci failed, retry $i"; sleep 5; }; done
      - name: Generate store (Nuxt static SPA)
        env:
          NUXT_PUBLIC_API_BASE: https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api
        run: npm --workspace store run generate
        working-directory: web
      - name: Verify build output
        run: test -f web/store/.output/public/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: store-dist
          path: web/store/.output/public

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: store-dist
          path: ./store-dist
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_STORE }}
          action: 'upload'
          app_location: 'store-dist'
          output_location: ''
          skip_app_build: true
