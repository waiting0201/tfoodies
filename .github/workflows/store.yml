name: store

on:
  push:
    branches: [main]
    paths: ['web/store/**', 'web/packages/**', '.github/workflows/store.yml']
  pull_request:
    paths: ['web/store/**', 'web/packages/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
        working-directory: web
      - name: Build store (Nuxt SPA)
        env:
          NUXT_PUBLIC_API_BASE: https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api
        run: npm --workspace store run build
        working-directory: web
      - name: Verify build output
        run: test -f web/store/.output/public/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: store-dist
          path: web/store/.output/public

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: store-dist
          path: web/store/.output/public
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_STORE }}
          action: 'upload'
          app_location: 'web/store'
          output_location: '.output/public'
          skip_app_build: true
